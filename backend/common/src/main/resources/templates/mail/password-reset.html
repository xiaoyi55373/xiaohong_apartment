<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码重置</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f5f5f5;">
    <table role="presentation" style="width: 100%; border-collapse: collapse;">
        <tr>
            <td align="center" style="padding: 40px 0;">
                <table role="presentation" style="width: 600px; border-collapse: collapse; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
                    <!-- Header -->
                    <tr>
                        <td style="padding: 40px 40px 20px; text-align: center; background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%); border-radius: 12px 12px 0 0;">
                            <h1 style="margin: 0; color: #ffffff; font-size: 24px; font-weight: 600;" th:text="${brandName}">小红公寓</h1>
                        </td>
                    </tr>
                    <!-- Content -->
                    <tr>
                        <td style="padding: 40px;">
                            <h2 style="margin: 0 0 20px; color: #333333; font-size: 20px; font-weight: 600;">密码重置</h2>
                            <p style="margin: 0 0 16px; color: #666666; font-size: 14px;">
                                尊敬的 <span th:text="${userName}">用户</span>，您好！
                            </p>
                            <p style="margin: 0 0 24px; color: #666666; font-size: 14px; line-height: 1.6;">
                                您申请了密码重置，请点击下方按钮完成重置（<span th:text="${expireHours}">24</span>小时内有效）：
                            </p>
                            
                            <div style="text-align: center; margin: 32px 0;">
                                <a th:href="${resetUrl}" style="display: inline-block; padding: 14px 40px; background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%); color: #ffffff; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: 500;">重置密码</a>
                            </div>
                            
                            <p style="margin: 24px 0 0; color: #999999; font-size: 12px; line-height: 1.6;">
                                如无法点击按钮，请复制以下链接到浏览器打开：<br>
                                <span th:text="${resetUrl}" style="color: #FF6B6B; word-break: break-all;">https://xiaohong.com/reset-password?token=xxx</span>
                            </p>
                            <p style="margin: 16px 0 0; color: #999999; font-size: 12px;">如非本人操作，请忽略此邮件。</p>
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="padding: 20px 40px; text-align: center; border-top: 1px solid #EEEEEE;">
                            <p style="margin: 0; color: #999999; font-size: 12px;"><span th:text="${brandName}">小红公寓</span> © 2026 版权所有</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
