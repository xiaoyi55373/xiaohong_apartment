<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证码</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f5f5f5;">
    <table role="presentation" style="width: 100%; border-collapse: collapse;">
        <tr>
            <td align="center" style="padding: 40px 0;">
                <table role="presentation" style="width: 600px; border-collapse: collapse; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
                    <!-- Header -->
                    <tr>
                        <td style="padding: 40px 40px 20px; text-align: center; background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%); border-radius: 12px 12px 0 0;">
                            <h1 style="margin: 0; color: #ffffff; font-size: 24px; font-weight: 600;" th:text="${brandName}">小红公寓</h1>
                            <p style="margin: 8px 0 0; color: rgba(255,255,255,0.9); font-size: 14px;" th:text="${brandSlogan}">让租房更简单</p>
                        </td>
                    </tr>
                    <!-- Content -->
                    <tr>
                        <td style="padding: 40px;">
                            <h2 style="margin: 0 0 20px; color: #333333; font-size: 20px; font-weight: 600;">验证码</h2>
                            <p style="margin: 0 0 24px; color: #666666; font-size: 14px; line-height: 1.6;">
                                您好，您的验证码如下，请在<strong><span th:text="${expireMinutes}">5</span>分钟</strong>内使用：
                            </p>
                            <div style="text-align: center; padding: 30px; background-color: #FFF5F5; border-radius: 8px; margin: 24px 0;">
                                <span style="font-size: 36px; font-weight: 700; color: #FF6B6B; letter-spacing: 8px;" th:text="${code}">123456</span>
                            </div>
                            <p style="margin: 24px 0 0; color: #999999; font-size: 12px; line-height: 1.6;">如非本人操作，请忽略此邮件。</p>
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="padding: 20px 40px; text-align: center; border-top: 1px solid #EEEEEE;">
                            <p style="margin: 0; color: #999999; font-size: 12px;"><span th:text="${brandName}">小红公寓</span> © 2026 版权所有</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
