server:
  port: 8080

spring:
  application:
    name: 小红公寓claw - 后台管理系统(测试环境)
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:3306/lease_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2b8
    username: root
    password: ${DB_PASSWORD:your_password_here}
    hikari:
      connection-test-query: SELECT 1
      connection-timeout: 60000
      idle-timeout: 500000
      max-lifetime: 540000
      maximum-pool-size: 12
      minimum-idle: 10
      pool-name: SPHHikariPool
  jackson:
    time-zone: GMT+8

  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      # 连接池配置
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 1000ms
      # 超时配置
      timeout: 5000ms
      # 关闭超时
      shutdown-timeout: 100ms

# 小红公寓claw 缓存配置
xiaohong:
  cache:
    enabled: true
  performance:
    enabled: true
  rate-limit:
    enabled: true
    default-window: 60
    default-max-requests: 100
    login-window: 60
    login-max-requests: 5
    sms-window: 60
    sms-max-requests: 3
  circuit-breaker:
    enabled: true
    default-failure-threshold: 5
    default-success-threshold: 3
    default-timeout-duration: 30000
    default-half-open-max-calls: 3

# 测试环境关闭SQL打印，使用日志记录
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

springdoc:
  default-flat-param-object: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:your_access_key}
  secret-key: ${MINIO_SECRET_KEY:your_secret_key}
  bucket-name: ${MINIO_BUCKET:xiaohong}

admin:
  auth:
    path-patterns:
      include: /admin/**
      exclude: /admin/login/**
