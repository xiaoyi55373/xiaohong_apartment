server:
  port: 8080

spring:
  application:
    name: 小红公寓claw - 后台管理系统(开发环境)
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql:///lease?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2b8
    username: root
    password: ${DB_PASSWORD:your_password_here}
    hikari:
      connection-test-query: SELECT 1
      connection-timeout: 60000
      idle-timeout: 500000
      max-lifetime: 540000
      maximum-pool-size: 12
      minimum-idle: 10
      pool-name: SPHHikariPool

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      # 连接池配置
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 1000ms
      # 超时配置
      timeout: 5000ms
      # 关闭超时
      shutdown-timeout: 100ms

# 开发环境打印SQL语句，便于调试
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  default-flat-param-object: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: xiaohong

admin:
  auth:
    path-patterns:
      include: /admin/**
      exclude: /admin/login/**
