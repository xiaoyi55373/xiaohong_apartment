<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 方形版本Logo - 用于应用图标 -->
  <defs>
    <linearGradient id="squareGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#FF9F43"/>
    </linearGradient>
  </defs>
  
  <!-- 圆角方形背景 -->
  <rect x="2" y="2" width="96" height="96" rx="20" ry="20" fill="url(#squareGradient)"/>
  
  <!-- 爪形图标 -->
  <g fill="white">
    <!-- 中心圆 -->
    <circle cx="50" cy="48" r="10"/>
    <!-- 爪指 - 左外 -->
    <ellipse cx="28" cy="42" rx="6" ry="16" transform="rotate(-25 28 42)"/>
    <!-- 爪指 - 右外 -->
    <ellipse cx="72" cy="42" rx="6" ry="16" transform="rotate(25 72 42)"/>
    <!-- 爪指 - 左内 -->
    <ellipse cx="40" cy="32" rx="5" ry="13" transform="rotate(-12 40 32)"/>
    <!-- 爪指 - 右内 -->
    <ellipse cx="60" cy="32" rx="5" ry="13" transform="rotate(12 60 32)"/>
  </g>
</svg>