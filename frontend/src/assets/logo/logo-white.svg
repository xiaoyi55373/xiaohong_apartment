<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- 白色版本Logo - 用于深色背景 -->
  
  <!-- Logo图标 - 圆形背景+爪形 -->
  <circle cx="50" cy="50" r="40" fill="white"/>
  
  <!-- 爪形图标 -->
  <g fill="#FF6B6B">
    <!-- 中心圆 -->
    <circle cx="50" cy="45" r="8"/>
    <!-- 爪指 -->
    <ellipse cx="35" cy="40" rx="5" ry="12" transform="rotate(-20 35 40)"/>
    <ellipse cx="65" cy="40" rx="5" ry="12" transform="rotate(20 65 40)"/>
    <ellipse cx="42" cy="35" rx="4" ry="10" transform="rotate(-10 42 35)"/>
    <ellipse cx="58" cy="35" rx="4" ry="10" transform="rotate(10 58 35)"/>
  </g>
  
  <!-- 品牌文字 -->
  <text x="105" y="45" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="bold" fill="white">小红公寓</text>
  <text x="105" y="68" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="500" fill="white" opacity="0.9">claw</text>
</svg>