# 公寓项目测试配置文件

# =============================================================================
# 路径配置
# =============================================================================

# 后端项目路径
BACKEND_DIR=/Users/dream3.14/Desktop/90/1208158461/公寓项目/代码/代码/后端/lease

# 前端项目路径
FRONTEND_DIR=/Users/dream3.14/Desktop/90/1208158461/公寓项目/代码/代码/前端/后台管理系统/rentHouseAdmin

# 移动端项目路径
MOBILE_DIR=/Users/dream3.14/Desktop/90/1208158461/公寓项目/代码/代码/前端/移动端/rentHouseH5

# =============================================================================
# 测试配置
# =============================================================================

# 默认最大重试次数
DEFAULT_MAX_RETRIES=3

# 重试间隔（秒）
RETRY_DELAY=5

# 命令执行超时时间（秒，0表示无限制）
COMMAND_TIMEOUT=300

# =============================================================================
# Java 配置
# =============================================================================

# Java 版本要求
JAVA_VERSION_REQUIRED=17

# Maven 版本要求
MAVEN_VERSION_REQUIRED=3.6

# =============================================================================
# Node.js 配置
# =============================================================================

# Node.js 版本要求
NODE_VERSION_REQUIRED=18

# NPM 镜像源（可选）
# NPM_REGISTRY=https://registry.npmmirror.com

# =============================================================================
# 日志配置
# =============================================================================

# 是否显示详细输出
VERBOSE=false

# 是否记录命令完整输出
LOG_FULL_OUTPUT=false

# 日志保留天数
LOG_RETENTION_DAYS=30

# =============================================================================
# 高级配置
# =============================================================================

# 是否自动安装缺失的依赖
AUTO_INSTALL=false

# 测试失败后是否继续执行下一个任务
CONTINUE_ON_FAILURE=true

# 是否生成 HTML 测试报告
GENERATE_HTML_REPORT=true
